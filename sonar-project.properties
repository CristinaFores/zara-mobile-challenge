# SonarCloud configuration
sonar.organization=cristinafores
sonar.projectKey=CristinaFores_zara-mobile-challenge
sonar.projectName=zara-mobile-challenge

# Sources and tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**,**/__mocks__/**

# Exclusions: generated/style/type-only files add no analysis value
sonar.exclusions=**/*.scss,**/*.module.scss,src/types/**,**/__mocks__/**,next.config.ts

# Coverage (lcov produced by `npm run test:coverage`)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**,**/__mocks__/**,src/app/layout.tsx,src/app/page.tsx

sonar.sourceEncoding=UTF-8
