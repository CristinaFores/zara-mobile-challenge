# SonarCloud configuration
sonar.organization=cristinafores
sonar.projectKey=CristinaFores_zara-mobile-challenge
sonar.projectName=zara-mobile-challenge

# Sources and tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**,**/__mocks__/**

# Exclusions: generated/style/type-only files add no analysis value
sonar.exclusions=**/*.scss,**/*.module.scss,src/shared/types/**,**/__mocks__/**,next.config.ts

# Coverage (lcov produced by `npm run test:coverage`)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Coverage-excluded: constants (plain values) and App Router boundary files
# (layout/page/error/loading/not-found are framework wiring, not logic to unit test).
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**,**/__mocks__/**,src/shared/constants/**,src/app/layout.tsx,src/app/page.tsx,src/app/error.tsx,src/app/not-found.tsx,src/app/**/loading.tsx

sonar.sourceEncoding=UTF-8

# Disabled rules
# typescript:S6759 — "Mark props as read-only": React convention but not enforced here
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6759
sonar.issue.ignore.multicriteria.e1.resourceKey=src/**/*.tsx
